<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotspotOS - Login</title>
    <style>
        :root { --primary: #2563eb; --secondary: #1e40af; --gray-50: #f9fafb; --gray-800: #1f2937; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: linear-gradient(135deg, var(--primary), var(--secondary));
               min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
                width: 100%; max-width: 400px; padding: 2.5rem; }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand h1 { font-size: 1.5rem; color: var(--gray-800); }
        .brand p { color: #6b7280; font-size: 0.875rem; margin-top: 0.25rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #d1d5db; border-radius: 0.5rem;
                font-size: 0.9375rem; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        button { width: 100%; padding: 0.875rem; background: linear-gradient(135deg, var(--primary), var(--secondary));
                 color: white; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600;
                 cursor: pointer; transition: all 0.2s; }
        button:hover { transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .alert { display: none; padding: 0.875rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.875rem; }
        .alert.error { display: block; background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }
        .alert.success { display: block; background: #d1fae5; border: 1px solid #a7f3d0; color: #065f46; }
        .footer { text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb;
                   font-size: 0.75rem; color: #9ca3af; }
        .trial-btn { display: block; text-align: center; margin-top: 0.75rem; padding: 0.625rem;
                     background: #f3f4f6; color: var(--primary); text-decoration: none; border-radius: 0.5rem;
                     font-size: 0.875rem; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <h1>HotspotOS</h1>
            <p>WiFi Hotspot Access Portal</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>

        <a href="#" class="trial-btn" onclick="startTrial(); return false;">Free Trial Access</a>

        <div class="footer">
            <p>Powered by HotspotOS v1.0.0</p>
            <p>Need help? Contact support@hotspotos.com</p>
        </div>
    </div>

    <script>
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + type;
        }

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const params = new URLSearchParams(formData);

            try {
                const response = await fetch('/cgi-bin/hotspot/login', {
                    method: 'POST',
                    body: params
                });
                const data = await response.json();

                if (data.success) {
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = data.redirect, 1500);
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (err) {
                showAlert('Connection error. Please try again.', 'error');
            }
        });

        async function startTrial() {
            try {
                const response = await fetch('/cgi-bin/hotspot/trial', { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    showAlert('Trial started! Enjoy your free access.', 'success');
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (err) {
                showAlert('Trial unavailable. Please try again later.', 'error');
            }
        }
    </script>
</body>
</html>
