name: Build HotspotOS Firmware

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt Version'
        required: true
        default: '23.05.6'
      target:
        description: 'Target'
        required: true
        default: 'lantiq'
      subtarget:
        description: 'Subtarget'
        required: true
        default: 'xrx200'

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '23.05.6' }}
  TARGET: ${{ github.event.inputs.target || 'lantiq' }}
  SUBTARGET: ${{ github.event.inputs.subtarget || 'xrx200' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo apt-get clean
        docker rmi $(docker images -q) 2>/dev/null || true
        df -h

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses5-dev libssl-dev \
          python3 python3-distutils python3-setuptools \
          rsync unzip zlib1g-dev file wget curl \
          subversion libelf-dev ecj fastjar \
          java-propose-classpath libncursesw5-dev \
          libpython3-dev locales qemu-utils time xsltproc \
          lib32gcc-s1 lib32stdc++6
        sudo locale-gen en_US.UTF-8

    - name: Clone OpenWrt
      run: |
        mkdir -p build
        git clone --depth 1 --branch "v${{ env.OPENWRT_VERSION }}" \
          https://git.openwrt.org/openwrt/openwrt.git \
          build/openwrt

    - name: Setup feeds
      run: |
        cd build/openwrt
        cp ../../feeds.conf.hotspotos feeds.conf 2>/dev/null || \
          cp ../../feeds.conf.hotspots feeds.conf 2>/dev/null || true
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        cp -r ../../package/* package/ 2>/dev/null || true
        ./scripts/feeds install -a -p custom 2>/dev/null || true

    - name: Apply configuration
      run: |
        cd build/openwrt
        cp ../../.config .config 2>/dev/null || true
        make defconfig

    - name: Download sources
      run: |
        cd build/openwrt
        make download -j$(nproc) || make download -j1 V=s

    - name: Build firmware
      run: |
        cd build/openwrt
        make -j$(nproc) V=s 2>&1 | tee build.log || {
          echo "Build failed, retrying with single core..."
          make -j1 V=s 2>&1 | tee build.log
        }

    - name: Collect output
      run: |
        mkdir -p output/packages
        cp build/openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.bin output/ 2>/dev/null || true
        cp build/openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.img output/ 2>/dev/null || true
        cp build/openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/sha256sums output/ 2>/dev/null || true
        cp build/openwrt/bin/packages/*/*/hotspotos*.ipk output/packages/ 2>/dev/null || true
        cp build/openwrt/build.log output/ 2>/dev/null || true
        
        for f in output/*.bin output/*.img; do
          [ -f "$f" ] || continue
          basename=$(basename "$f")
          if echo "$basename" | grep -q "openwrt"; then
            newname=$(echo "$basename" | sed "s/openwrt/hotspotos-v1.0.0/g")
            mv "$f" "output/$newname"
            echo "Renamed: $basename -> $newname"
          fi
        done

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hotspotos-firmware-${{ env.TARGET }}-${{ env.SUBTARGET }}
        path: |
          output/*.bin
          output/*.img
          output/sha256sums
          output/build.log
        retention-days: 30

    - name: Upload package artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hotspotos-packages-${{ env.TARGET }}-${{ env.SUBTARGET }}
        path: |
          output/packages/*.ipk
        retention-days: 30

    - name: Build summary
      run: |
        echo "=========================================="
        echo "  HotspotOS Build Complete"
        echo "=========================================="
        echo "Version: 1.0.0"
        echo "Target: ${{ env.TARGET }}/${{ env.SUBTARGET }}"
        echo "OpenWrt: ${{ env.OPENWRT_VERSION }}"
        echo ""
        echo "Output:"
        ls -lh output/*.bin output/*.img 2>/dev/null || echo "No images"
        echo ""
        echo "Packages:"
        ls -lh output/packages/*.ipk 2>/dev/null || echo "No packages"
